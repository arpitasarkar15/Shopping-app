<!DOCTYPE html>
<html lang="en">

    <title>Simple Shopping Page</title>
    <!DOCTYPE html>
<html>
<head>
    <title>My Online Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: lightgrey;
            text-align: center;
        }

        h1 {
            background-color: rgb(101, 20, 20);
            color: white;
            padding: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .product {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px;
        }

        .product img {
            width: 100%;
            border-radius: 10px;
        }

        .product h2 {
            font-size: 18px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart {
            background-color: green;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;

        }
 </style>
</head>
<body>
<h1>My Online Store</h1>
<div> 
<h2>T-Shirt</h2>
<img src="https://d2fy0k1bcbbnwr.cloudfront.net/Designs_Inners_and_Outers/Tshirts/Women/tshirt_hs_oversized_women_pat_d28_o.jpg" alt="T-Shirt" width="300px">
<p>Price: ₹500</p>
<button>Add to Cart</button>
<button>Buy Now</button>
</div>

<div>
<h2>Shoes</h2>
<img src="https://images-static.nykaa.com/media/catalog/product/0/8/08b6f1c22L-996BLK-PEACH_1.jpg?tr=w-500" alt="Shoes" width="300px">
<p>Price: ₹1500</p>
<button>Add to Cart</button>
<button>Buy Now</button>
</div>

<div>

<p>Price: ₹1200</p>
<button>Add to Cart</button>
<button>Buy Now</button>
</div>

<div>
    <h2>Backpack</h2>

</html>
